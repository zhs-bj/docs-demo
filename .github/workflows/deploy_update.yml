# 文件名: .github/workflows/deploy.yml
name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]  # 将你的主分支名替换到这里
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'  # 如果你使用的是 npm 或 yarn，请相应修改这里

      - name: Setup pnpm  # 如果使用 npm 或 yarn，可以删除这一步
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install  # 或 npm install / yarn install

      - name: Build with VitePress
        run: pnpm run docs:build  # 或 npm run docs:build / yarn docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # ✅ 更新到最新版本
        with:
          path: ./.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # ✅ 更新到最新版本
